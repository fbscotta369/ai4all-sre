# ──────────────────────────────────────────────────────────────────────────────
# Kyverno Policy Test: require-probes
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-require-probes
policies:
  - ../../platforms/terraform/governance/governance.tf
resources:
  - resources.yaml
results:
  - policy: require-probes
    rule: check-probes
    resource: test-no-probes-pod
    kind: Pod
    result: fail
  - policy: require-probes
    rule: check-probes
    resource: test-with-probes-pod
    kind: Pod
    result: pass
