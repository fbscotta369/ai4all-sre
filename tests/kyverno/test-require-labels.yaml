# ──────────────────────────────────────────────────────────────────────────────
# Kyverno Policy Test: require-mandatory-labels
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-require-labels
policies:
  - ../../platforms/terraform/governance/governance.tf
resources:
  - resources.yaml
results:
  - policy: require-mandatory-labels
    rule: check-required-labels
    resource: test-no-labels-pod
    kind: Pod
    result: fail
  - policy: require-mandatory-labels
    rule: check-required-labels
    resource: test-labeled-pod
    kind: Pod
    result: pass
