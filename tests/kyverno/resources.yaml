---
# ── Should FAIL: missing probes ───────────────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: test-no-probes-pod
  namespace: online-boutique
spec:
  containers:
    - name: app
      image: nginx:1.25.4
      resources:
        limits:
          cpu: "100m"
          memory: "128Mi"
---
# ── Should PASS: has liveness + readiness probes ──────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: test-with-probes-pod
  namespace: online-boutique
spec:
  containers:
    - name: app
      image: nginx:1.25.4
      resources:
        limits:
          cpu: "100m"
          memory: "128Mi"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 80
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /ready
          port: 80
        periodSeconds: 5
