# ──────────────────────────────────────────────────────────────────────────────
# Kyverno Policy Test Resources
# Shared test fixtures for kyverno-cli policy testing.
# ──────────────────────────────────────────────────────────────────────────────

# ── Should FAIL: privileged container ──────────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: test-privileged-pod
  namespace: test
spec:
  containers:
    - name: nginx
      image: nginx:1.25.4
      securityContext:
        privileged: true
      resources:
        limits:
          cpu: "100m"
          memory: "128Mi"
---
# ── Should PASS: non-privileged container ──────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: test-nonprivileged-pod
  namespace: test
spec:
  containers:
    - name: nginx
      image: nginx:1.25.4
      securityContext:
        privileged: false
      resources:
        limits:
          cpu: "100m"
          memory: "128Mi"
---
# ── Should FAIL: :latest tag ──────────────────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: test-latest-tag-pod
  namespace: online-boutique
spec:
  containers:
    - name: app
      image: nginx:latest
      resources:
        limits:
          cpu: "100m"
          memory: "128Mi"
---
