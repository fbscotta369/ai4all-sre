apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-identity-issuer
  namespace: linkerd
spec:
  secretName: linkerd-identity-issuer-secret
  duration: 48h
  renewBefore: 24h
  issuerRef:
    name: linkerd-trust-anchor-issuer
    kind: Issuer
  commonName: identity.linkerd.cluster.local
  dnsNames:
  - identity.linkerd.cluster.local
  isCA: true
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
  - "cert sign"
  - "crl sign"
  - "digital signature"
  - "key encipherment"
