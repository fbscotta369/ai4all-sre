name: AI4ALL Docs Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'ai-lab/**'
      - 'mkdocs.yml'
      - '.github/workflows/ai-docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocstrings[python] pydoc-markdown pyyaml

      - name: Generate Dependency Table
        run: |
          # Mock conda for the CI environment if conda is not available
          # In a real scenario, you might use a conda action
          python scripts/generate_dependency_table.py || echo "Skipping conda export in CI"

      - name: Build Documentation
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
